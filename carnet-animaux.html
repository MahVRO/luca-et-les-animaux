<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le carnet d'animaux</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Atkinson+Hyperlegible:wght@400;700&display=swap');

  :root{
    --bg:#F6F2E7;
    --paper:#FFFEFB;
    --ink:#2B3A2F;
    --ochre:#B8722E;
    --forest:#4F7A63;
    --gold:#E4A73B;
    --soft-line:#DDD5C2;
    --gentle:#C4633D;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(79,122,99,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(184,114,46,0.07), transparent 45%);
    color:var(--ink);
    font-family:'Atkinson Hyperlegible', sans-serif;
    min-height:100vh;
  }

  .wrap{
    max-width:780px;
    margin:0 auto;
    padding:34px 18px 80px;
  }

  header{
    text-align:center;
    margin-bottom:28px;
  }
  .eyebrow{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--forest);
    font-weight:700;
    margin-bottom:6px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(28px,6vw,42px);
    margin:0 0 8px;
    color:var(--ink);
  }
  .lede{
    font-size:17px;
    color:#5b6b5f;
    max-width:440px;
    margin:0 auto;
  }

  /* Notebook tabs */
  .tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:28px 0 0;
  }
  .tab{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:16px;
    background:var(--paper);
    border:2px solid var(--soft-line);
    border-bottom:none;
    padding:12px 22px 14px;
    border-radius:14px 14px 0 0;
    cursor:pointer;
    color:#8a9188;
    position:relative;
    top:2px;
    transition:all .15s ease;
  }
  .tab.active{
    color:var(--ink);
    border-color:var(--ochre);
    background:var(--paper);
    box-shadow:0 -4px 14px rgba(184,114,46,0.08);
  }
  .tab:hover{color:var(--ink);}

  .page{
    background:var(--paper);
    border:2px solid var(--ochre);
    border-radius:0 16px 16px 16px;
    padding:30px 26px;
    box-shadow:0 18px 50px -24px rgba(43,58,47,0.35);
    position:relative;
  }
  .page::before{
    content:"";
    position:absolute;
    left:26px; top:0; bottom:0;
    width:1px;
    background:repeating-linear-gradient(to bottom, transparent 0 6px, var(--soft-line) 6px 7px);
    opacity:0.6;
  }

  .view{display:none;}
  .view.active{display:block;}

  /* Discover grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(120px,1fr));
    gap:14px;
    margin-top:6px;
  }
  .card{
    background:#fff;
    border:2px solid var(--soft-line);
    border-radius:12px;
    padding:16px 10px 12px;
    text-align:center;
    cursor:pointer;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    user-select:none;
  }
  .card:nth-child(3n+1){transform:rotate(-1.2deg);}
  .card:nth-child(3n+2){transform:rotate(0.8deg);}
  .card:nth-child(3n){transform:rotate(-0.4deg);}
  .card:hover{
    border-color:var(--ochre);
    box-shadow:0 8px 20px -8px rgba(184,114,46,0.35);
  }
  .card .emoji{
    font-size:40px;
    display:block;
    margin-bottom:8px;
  }
  .card .word{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:15px;
    color:var(--ink);
    opacity:0;
    max-height:0;
    overflow:hidden;
    transition:opacity .2s ease;
  }
  .card.revealed .word{opacity:1; max-height:30px;}
  .card .stamp{
    position:absolute;
    margin-top:-52px;
    margin-left:70px;
    font-size:18px;
    display:none;
  }
  .card.revealed .stamp{display:block;}

  .progress-line{
    margin-top:22px;
    font-size:14px;
    color:var(--forest);
    font-weight:700;
    text-align:center;
  }

  /* Quiz view */
  .quiz-box{text-align:center;}
  .quiz-emoji{
    font-size:90px;
    margin:10px 0 4px;
    display:block;
  }
  .quiz-prompt{
    font-family:'Fraunces', serif;
    font-size:19px;
    font-weight:600;
    margin-bottom:22px;
  }
  .listen-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:none;
    border:2px solid var(--forest);
    color:var(--forest);
    font-family:'Atkinson Hyperlegible', sans-serif;
    font-weight:700;
    font-size:14px;
    padding:8px 16px;
    border-radius:30px;
    cursor:pointer;
    margin-bottom:22px;
    transition:all .15s ease;
  }
  .listen-btn:hover{background:var(--forest); color:#fff;}

  .choices{
    display:flex;
    flex-direction:column;
    gap:12px;
    max-width:340px;
    margin:0 auto;
  }
  .choice-btn{
    font-family:'Fraunces', serif;
    font-size:18px;
    font-weight:600;
    padding:16px 18px;
    border-radius:12px;
    border:2px solid var(--soft-line);
    background:#fff;
    color:var(--ink);
    cursor:pointer;
    transition:all .15s ease;
  }
  .choice-btn:hover{border-color:var(--ochre); transform:translateY(-1px);}
  .choice-btn.correct{
    background:var(--forest);
    border-color:var(--forest);
    color:#fff;
  }
  .choice-btn.wrong{
    background:#fbeee7;
    border-color:var(--gentle);
    color:var(--gentle);
  }

  .feedback{
    margin-top:20px;
    font-size:16px;
    font-weight:700;
    min-height:24px;
  }
  .feedback.good{color:var(--forest);}
  .feedback.soft{color:var(--gentle);}

  .next-btn{
    margin-top:18px;
    font-family:'Atkinson Hyperlegible', sans-serif;
    font-weight:700;
    font-size:15px;
    background:var(--ochre);
    color:#fff;
    border:none;
    padding:12px 26px;
    border-radius:30px;
    cursor:pointer;
    display:none;
  }
  .next-btn.show{display:inline-block;}

  .score-line{
    margin-top:26px;
    font-size:14px;
    color:#8a9188;
  }

  footer{
    text-align:center;
    margin-top:26px;
    font-size:13px;
    color:#9aa39a;
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="eyebrow">Carnet de terrain</div>
    <h1>Le carnet d'animaux</h1>
    <p class="lede">Découvre les animaux, apprends leur nom, et teste-toi quand tu veux.</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="discover">Découvrir</button>
    <button class="tab" data-view="quiz">Jeu</button>
  </div>

  <div class="page">

    <div class="view active" id="view-discover">
      <div class="grid" id="grid"></div>
      <div class="progress-line" id="progress-line">0 / 16 animaux découverts</div>
    </div>

    <div class="view" id="view-quiz">
      <div class="quiz-box">
        <span class="quiz-emoji" id="quiz-emoji">🦁</span>
        <div class="quiz-prompt">Quel est cet animal ?</div>
        <button class="listen-btn" id="listen-btn">🔊 Écouter</button>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn">Animal suivant →</button>
        <div class="score-line" id="score-line">0 bonnes réponses</div>
      </div>
    </div>

  </div>

  <footer>Astuce : le bouton 🔊 lit le mot à voix haute.</footer>
</div>

<script>
(function(){
  const animals = [
    {emoji:"🦁", word:"Lion"},
    {emoji:"🐘", word:"Éléphant"},
    {emoji:"🦒", word:"Girafe"},
    {emoji:"🐯", word:"Tigre"},
    {emoji:"🐒", word:"Singe"},
    {emoji:"🦓", word:"Zèbre"},
    {emoji:"🦛", word:"Hippopotame"},
    {emoji:"🐊", word:"Crocodile"},
    {emoji:"🐬", word:"Dauphin"},
    {emoji:"🐢", word:"Tortue"},
    {emoji:"🦋", word:"Papillon"},
    {emoji:"🦔", word:"Hérisson"},
    {emoji:"🦊", word:"Renard"},
    {emoji:"🦅", word:"Aigle"},
    {emoji:"🦈", word:"Requin"},
    {emoji:"🐧", word:"Pingouin"},
  ];

  const discovered = new Set();
  const grid = document.getElementById('grid');
  const progressLine = document.getElementById('progress-line');

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR';
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  }

  animals.forEach((a, i)=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<span class="emoji">${a.emoji}</span><span class="word">${a.word}</span><span class="stamp">✔️</span>`;
    card.addEventListener('click', ()=>{
      card.classList.add('revealed');
      discovered.add(i);
      progressLine.textContent = `${discovered.size} / ${animals.length} animaux découverts`;
      speak(a.word);
    });
    grid.appendChild(card);
  });

  // Tabs
  const tabs = document.querySelectorAll('.tab');
  const views = document.querySelectorAll('.view');
  tabs.forEach(tab=>{
    tab.addEventListener('click', ()=>{
      tabs.forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      views.forEach(v=>v.classList.remove('active'));
      document.getElementById('view-' + tab.dataset.view).classList.add('active');
      if(tab.dataset.view === 'quiz') newQuestion();
    });
  });

  // Quiz
  const quizEmoji = document.getElementById('quiz-emoji');
  const choicesEl = document.getElementById('choices');
  const feedbackEl = document.getElementById('feedback');
  const nextBtn = document.getElementById('next-btn');
  const listenBtn = document.getElementById('listen-btn');
  const scoreLine = document.getElementById('score-line');

  let current = null;
  let score = 0;
  let asked = 0;
  let answered = false;

  function shuffle(arr){
    return [...arr].sort(()=>Math.random()-0.5);
  }

  function newQuestion(){
    answered = false;
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
    nextBtn.classList.remove('show');

    current = animals[Math.floor(Math.random()*animals.length)];
    quizEmoji.textContent = current.emoji;

    const distractors = shuffle(animals.filter(a=>a.word !== current.word)).slice(0,2);
    const options = shuffle([current, ...distractors]);

    choicesEl.innerHTML = '';
    options.forEach(opt=>{
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = opt.word;
      btn.addEventListener('click', ()=> handleAnswer(btn, opt));
      choicesEl.appendChild(btn);
    });
  }

  function handleAnswer(btn, opt){
    if(answered) return;
    answered = true;
    asked++;

    const allBtns = choicesEl.querySelectorAll('.choice-btn');

    if(opt.word === current.word){
      btn.classList.add('correct');
      score++;
      feedbackEl.textContent = 'Bravo, bonne réponse !';
      feedbackEl.className = 'feedback good';
      speak('Bravo, c\'est ' + current.word);
    } else {
      btn.classList.add('wrong');
      allBtns.forEach(b=>{
        if(b.textContent === current.word) b.classList.add('correct');
      });
      feedbackEl.textContent = `Presque ! C'était : ${current.word}`;
      feedbackEl.className = 'feedback soft';
      speak('C\'est ' + current.word);
    }

    scoreLine.textContent = `${score} bonne${score>1?'s':''} réponse${score>1?'s':''} sur ${asked}`;
    nextBtn.classList.add('show');
  }

  nextBtn.addEventListener('click', newQuestion);
  listenBtn.addEventListener('click', ()=> speak(current ? current.word : ''));

})();
</script>

</body>
</html>
